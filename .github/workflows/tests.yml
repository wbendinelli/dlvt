name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Offline reference audit (structure check)
        run: python scripts/audit_refs.py --offline > /dev/null
